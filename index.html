<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USA Chemistry & Pharmacy Grad Finder</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--line:#e5e7eb;--primary:#0b5cab}
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    header{background:var(--primary);color:#fff;padding:24px 16px;text-align:center}
    header h1{margin:0;font-size:clamp(1.4rem,2.5vw,2.4rem)}
    header p{margin:8px 0 0;font-size:1rem;opacity:.95}
    main{max-width:1200px;margin:0 auto;padding:16px}
    .hero-btn{display:inline-block;margin-top:16px;background:#fff;color:var(--primary);text-decoration:none;padding:12px 18px;border-radius:999px;font-weight:700}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.05);padding:16px;margin:16px 0}
    .filters{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
    @media (max-width:900px){.filters{grid-template-columns:1fr 1fr}}
    @media (max-width:600px){.filters{grid-template-columns:1fr}}
    label{display:block;font-size:.9rem;font-weight:700;margin-bottom:6px}
    input,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:1rem}
    .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:14px}
    @media (max-width:900px){.stats{grid-template-columns:repeat(2,1fr)}}
    @media (max-width:600px){.stats{grid-template-columns:1fr}}
    .stat{border:1px solid var(--line);border-radius:14px;padding:14px;text-align:center;background:#fafafa}
    .stat b{display:block;font-size:1.35rem}
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;min-width:980px;background:#fff}
    th,td{border-bottom:1px solid var(--line);padding:12px 10px;vertical-align:top;text-align:left}
    th{background:#f8fafc;position:sticky;top:0;z-index:1}
    a{color:var(--primary)}
    .tag{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef4ff;color:#2457a7;font-size:.85rem}
    .note{color:var(--muted);font-size:.95rem;margin-top:8px}
  </style>
</head>
<body>
  <header>
    <h1>USA Chemistry & Pharmacy Grad Finder</h1>
    <p>Works on phone and desktop. Filter by state, tier, area, fee, and funding.</p>
    <a class="hero-btn" href="#table">Share this URL with friends</a>
  </header>
  <main>
    <section class="panel">
      <div class="filters">
        <div><label>Search</label><input id="search" placeholder="University or program"></div>
        <div><label>State</label><select id="state"><option value="all">All states</option></select></div>
        <div><label>Area</label><select id="area"><option value="all">All</option><option value="Pharmacy">Pharmacy</option><option value="Chemistry">Chemistry</option></select></div>
        <div><label>Tier</label><select id="tier"><option value="all">All</option><option value="low">Low</option><option value="mid">Mid</option><option value="high">High</option><option value="ivy">Ivy League</option></select></div>
        <div><label>Fee</label><select id="fee"><option value="all">All</option><option value="free">Free/Waiver</option><option value="paid">Paid</option><option value="check">Check portal</option></select></div>
        <div><label>Funding</label><select id="funding"><option value="all">All</option><option value="full">Fully funded only</option><option value="maybe">Possible funding</option></select></div>
      </div>
      <p class="note">Tip: On GitHub Pages, save this file as <b>index.html</b> in the repo root.</p>
      <div class="stats">
        <div class="stat"><b id="count">0</b><span>Visible</span></div>
        <div class="stat"><b id="countIvy">0</b><span>Ivy</span></div>
        <div class="stat"><b id="countMid">0</b><span>Mid</span></div>
        <div class="stat"><b id="countLow">0</b><span>Low</span></div>
        <div class="stat"><b id="countFunded">0</b><span>Funded</span></div>
      </div>
    </section>

    <section class="panel" id="table">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>State</th><th>University</th><th>Program</th><th>Tier</th><th>Apply</th><th>Fee</th><th>Score</th><th>Funding</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const data = [
      {state:'NY',university:'Binghamton University–SUNY',program:'Pharmaceutical Sciences MS',area:'Pharmacy',tier:'low',apply:'https://www.binghamton.edu/pharmacy-and-pharmaceutical-sciences/academics/ms-and-phd/',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'TA/RA assistantships often available',full:'Yes'},
      {state:'NY',university:'St. John’s University',program:'Pharmaceutical Sciences MS',area:'Pharmacy',tier:'mid',apply:'https://www.stjohns.edu/academics/programs/pharmaceutical-sciences-master-science',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'TA/RA assistantships often available',full:'Yes'},
      {state:'NY',university:'University at Buffalo',program:'MS in Pharmaceutical Sciences',area:'Pharmacy',tier:'mid',apply:'https://pharmacy.buffalo.edu/admissions/pharmaceutical-sciences/graduate-programs/ms-in-pharmaceutical-sciences.international-students.html',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'TA/RA assistantships often available',full:'Yes'},
      {state:'CT',university:'University of Connecticut',program:'Pharmaceutical Sciences MS/PhD',area:'Pharmacy',tier:'mid',apply:'https://pharmacy.uconn.edu/graduate-degrees/',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'MI',university:'University of Michigan–Ann Arbor',program:'Pharmaceutical Sciences PhD',area:'Pharmacy',tier:'high',apply:'https://pharmacy.umich.edu/pharmacy-programs/phd/pharmaceutical-sciences/application-process-requirements/',fee:'paid',score:'TOEFL 90+ / IELTS 7.0+',funding:'Assistantships possible',full:'Maybe'},
      {state:'MA',university:'Harvard University',program:'Chemistry PhD',area:'Chemistry',tier:'ivy',apply:'https://www.harvard.edu',fee:'check',score:'TOEFL 100+ / IELTS 7.0+',funding:'Rare; mostly self-fund',full:'No'},
      {state:'CT',university:'Yale University',program:'Chemistry PhD',area:'Chemistry',tier:'ivy',apply:'https://www.yale.edu',fee:'check',score:'TOEFL 100+ / IELTS 7.0+',funding:'Rare; mostly self-fund',full:'No'},
      {state:'NY',university:'Columbia University',program:'Chemistry PhD',area:'Chemistry',tier:'ivy',apply:'https://www.columbia.edu',fee:'check',score:'TOEFL 100+ / IELTS 7.0+',funding:'Rare; mostly self-fund',full:'No'},
      {state:'NY',university:'Cornell University',program:'Chemistry and Chemical Biology PhD',area:'Chemistry',tier:'ivy',apply:'https://www.cornell.edu',fee:'check',score:'TOEFL 100+ / IELTS 7.0+',funding:'Rare; mostly self-fund',full:'No'},
      {state:'PA',university:'University of Pennsylvania',program:'Chemistry PhD',area:'Chemistry',tier:'ivy',apply:'https://www.upenn.edu',fee:'check',score:'TOEFL 100+ / IELTS 7.0+',funding:'Rare; mostly self-fund',full:'No'},
      {state:'GA',university:'University of Georgia',program:'Chemistry PhD',area:'Chemistry',tier:'mid',apply:'https://www.chem.uga.edu/graduate',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'PA',university:'Temple University',program:'Pharmaceutical Sciences MS',area:'Pharmacy',tier:'mid',apply:'https://www.temple.edu',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'IL',university:'University of Illinois Chicago',program:'Medicinal and Pharmaceutical Chemistry',area:'Pharmacy',tier:'mid',apply:'https://www.pharmgrad.org/program-directory/graduate-directory',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'MN',university:'University of Minnesota Twin Cities',program:'Pharmacology / related tracks',area:'Pharmacy',tier:'mid',apply:'https://www.pharmgrad.org/program-directory/graduate-directory',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'IA',university:'University of Iowa',program:'Pharmaceutics / Drug Discovery',area:'Pharmacy',tier:'mid',apply:'https://www.pharmgrad.org/program-directory/graduate-directory',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'KS',university:'University of Kansas',program:'Pharmaceutical Sciences',area:'Pharmacy',tier:'low',apply:'https://www.pharmgrad.org/program-directory/graduate-directory',fee:'check',score:'TOEFL 80+ / IELTS 6.5+',funding:'TA/RA assistantships often available',full:'Yes'},
      {state:'MO',university:'University of Missouri',program:'Chemistry MS/PhD',area:'Chemistry',tier:'low',apply:'https://www.gradschools.com/programs/physical-sciences/chemistry',fee:'check',score:'TOEFL 79-80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'AZ',university:'Arizona State University',program:'Chemistry PhD',area:'Chemistry',tier:'low',apply:'https://www.gradschools.com/programs/physical-sciences/chemistry',fee:'check',score:'TOEFL 79-80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'},
      {state:'SD',university:'South Dakota State University',program:'Chemistry PhD',area:'Chemistry',tier:'low',apply:'https://www.gradschools.com/programs/physical-sciences/chemistry',fee:'check',score:'TOEFL 79-80+ / IELTS 6.5+',funding:'Assistantships possible',full:'Maybe'}
    ];

    const stateSelect = document.getElementById('state');
    [...new Set(data.map(d => d.state))].sort().forEach(s => stateSelect.insertAdjacentHTML('beforeend', `<option value="${s}">${s}</option>`));

    function matchFee(d){
      if (fee.value === 'all') return true;
      if (fee.value === 'free') return d.fee === 'free' || d.fee.includes('waiver') || d.fee === 'check';
      if (fee.value === 'paid') return d.fee === 'paid';
      return d.fee === 'check';
    }

    function render(){
      const q = search.value.toLowerCase().trim();
      const filtered = data.filter(d => {
        const ok = (!q || `${d.university} ${d.program} ${d.state} ${d.area}`.toLowerCase().includes(q))
          && (state.value === 'all' || d.state === state.value)
          && (area.value === 'all' || d.area === area.value)
          && (tier.value === 'all' || d.tier === tier.value)
          && matchFee(d)
          && (funding.value === 'all' || (funding.value === 'full' ? (d.full === 'Yes' || d.full === 'Maybe') : d.full !== 'No'));
        return ok;
      });

      rows.innerHTML = filtered.map(d => `
        <tr>
          <td>${d.state}</td>
          <td>${d.university}</td>
          <td>${d.program}</td>
          <td><span class="tag">${d.tier}</span></td>
          <td><a href="${d.apply}" target="_blank" rel="noopener noreferrer">Open</a></td>
          <td>${d.fee}</td>
          <td>${d.score}</td>
          <td>${d.funding}</td>
        </tr>
      `).join('');

      count.textContent = filtered.length;
      countIvy.textContent = filtered.filter(d => d.tier === 'ivy').length;
      countMid.textContent = filtered.filter(d => d.tier === 'mid').length;
      countLow.textContent = filtered.filter(d => d.tier === 'low').length;
      countFunded.textContent = filtered.filter(d => d.full === 'Yes' || d.full === 'Maybe').length;
    }

    ['search','state','area','tier','fee','funding'].forEach(id => document.getElementById(id).addEventListener('input', render));
    render();
  </script>
</body>
</html>
